<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<title>RC Spots 🌍</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>

<style>
body {
  margin:0;
  font-family:Arial;
  background:#111;
  color:white;
}

header {
  text-align:center;
  padding:10px;
  font-size:22px;
}

#map { height:300px; }

button {
  padding:10px;
  border:none;
  border-radius:8px;
  background:#4CAF50;
  color:white;
  width:100%;
  margin-top:10px;
}

.card {
  background:#1e1e1e;
  margin:10px;
  padding:10px;
  border-radius:10px;
}

/* MINIATURY */
.thumb {
  width:60px;
  height:60px;
  object-fit:cover;
  border-radius:6px;
  margin-right:5px;
}

/* DETAIL MODAL */
.modal {
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.95);
  display:flex;
  justify-content:center;
  align-items:center;
}

.modal-content {
  background:#1e1e1e;
  padding:15px;
  border-radius:12px;
  width:90%;
  max-height:85%;
  overflow:auto;
}

/* SEKCE */
.section {
  margin-top:15px;
}

.section-title {
  font-weight:bold;
  margin-bottom:5px;
}

/* GALERIE */
.gallery {
  display:flex;
  flex-wrap:wrap;
  gap:6px;
}

.gallery img {
  width:90px;
  height:90px;
  object-fit:cover;
  border-radius:8px;
  cursor:pointer;
}

/* KOMENTÁŘE */
.comment {
  background:#2a2a2a;
  padding:6px;
  margin-top:5px;
  border-radius:6px;
  font-size:14px;
}

input, select {
  width:100%;
  padding:10px;
  border-radius:8px;
  border:none;
  margin-top:5px;
}
</style>
</head>

<body>

<header>RC Spots 🌍</header>

<div id="map"></div>

<div style="padding:10px;">
<button onclick="toggleAdd()">➕ Přidat spot</button>

<div id="addForm" style="display:none;">
<input id="name" placeholder="Název">
<input id="type" placeholder="Typ">
<input id="length" placeholder="Délka (m)">

<select id="difficulty">
<option value="">Obtížnost</option>
<option>Lehká</option>
<option>Střední</option>
<option>Těžká</option>
</select>

<input type="file" id="photos" multiple>

<button onclick="saveSpot()">Uložit</button>
</div>
</div>

<div id="list"></div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore, collection, addDoc, onSnapshot, doc, updateDoc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyDMDxeThwcGUICTptG3Cmll31D7h63Sh4U",
  authDomain: "rc-spots-ef03d.firebaseapp.com",
  projectId: "rc-spots-ef03d"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

let map = L.map('map').setView([49.8,15.5],7);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

let selectedLatLng=null;
let spots=[];
let adding=false;

map.on('click', e=>{
  if(!adding) return;
  selectedLatLng=e.latlng;
  alert("Místo vybráno");
});

window.toggleAdd=()=>{
  adding=!adding;
  addForm.style.display=adding?"block":"none";
};

window.saveSpot=async()=>{
  if(!selectedLatLng) return alert("Klikni na mapu");

  let images=[];
  for(let f of photos.files){
    images.push(await resizeImage(f));
  }

  await addDoc(collection(db,"spots"),{
    name:nameInput.value,
    type:typeInput.value,
    length:lengthInput.value,
    difficulty:difficulty.value,
    lat:selectedLatLng.lat,
    lng:selectedLatLng.lng,
    images,
    comments:[]
  });

  alert("Uloženo");
};

function resizeImage(file){
  return new Promise(res=>{
    let img=new Image();
    let reader=new FileReader();

    reader.onload=e=>img.src=e.target.result;

    img.onload=()=>{
      let canvas=document.createElement("canvas");
      let ctx=canvas.getContext("2d");

      let max=800;
      let w=img.width,h=img.height;

      if(w>max){h*=max/w;w=max;}
      if(h>max){w*=max/h;h=max;}

      canvas.width=w;
      canvas.height=h;

      ctx.drawImage(img,0,0,w,h);

      res(canvas.toDataURL("image/jpeg",0.7));
    };

    reader.readAsDataURL(file);
  });
}

onSnapshot(collection(db,"spots"), snap=>{

  list.innerHTML="";
  spots=[];

  snap.forEach(docSnap=>{
    let s=docSnap.data();
    s.id=docSnap.id;
    spots.push(s);

    L.marker([s.lat,s.lng]).addTo(map);

    let thumbs="";
    (s.images||[]).slice(0,3).forEach(i=>{
      thumbs+=`<img class="thumb" src="${i}">`;
    });

    let div=document.createElement("div");
    div.className="card";

    div.innerHTML=`
      <b>${s.name}</b><br>
      ${s.type}<br>
      📏 ${s.length||"-"} m<br>
      ⚡ ${s.difficulty||"-"}<br>
      ${thumbs}
      <button onclick="openDetail('${s.id}')">Detail</button>
    `;

    list.appendChild(div);
  });

});

window.openDetail=id=>{

  let s=spots.find(x=>x.id===id);

  let imgs="";
  (s.images||[]).forEach(i=>{
    imgs+=`<img src="${i}" onclick="window.open('${i}')">`;
  });

  let comments="";
  (s.comments||[]).forEach(c=>{
    comments+=`<div class="comment">${c.text}</div>`;
  });

  let modal=document.createElement("div");
  modal.className="modal";

  modal.innerHTML=`
  <div class="modal-content">

    <h2>${s.name}</h2>
    <div>${s.type}</div>
    <div>📏 ${s.length||"-"} m</div>
    <div>⚡ ${s.difficulty||"-"}</div>

    <div class="section">
      <div class="section-title">📷 Fotky</div>
      <div class="gallery">${imgs||"Žádné fotky"}</div>
    </div>

    <div class="section">
      <div class="section-title">💬 Komentáře</div>
      ${comments}
      <input id="cinput" placeholder="Napiš komentář">
      <button onclick="addComment('${s.id}')">Přidat</button>
    </div>

    <button onclick="this.parentElement.parentElement.remove()">Zavřít</button>

  </div>
  `;

  document.body.appendChild(modal);
};

window.addComment=async id=>{

  let text=document.getElementById("cinput").value;
  if(!text) return;

  let s=spots.find(x=>x.id===id);

  await updateDoc(doc(db,"spots",id),{
    comments:[...(s.comments||[]),{text}]
  });

};

</script>

</body>
</html>
