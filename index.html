<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RC Spots</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>

<style>
body { margin:0; font-family:Arial; background:#0f0f0f; color:white; }
h1 { text-align:center; }

#map { height:300px; transition:0.3s; }
#map.hidden { height:0; }

button {
  width:100%;
  padding:12px;
  margin-top:10px;
  border:none;
  border-radius:10px;
  background:green;
  color:white;
}

.card {
  background:#1a1a1a;
  margin:10px;
  padding:15px;
  border-radius:15px;
}

.thumb {
  width:70px;
  height:70px;
  object-fit:cover;
  border-radius:10px;
  margin-right:5px;
}

.gallery {
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:5px;
}

.gallery img {
  width:100%;
  border-radius:10px;
}

.modal {
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:#0f0f0f;
  display:none;
  overflow:auto;
  z-index:9999;
}

.modal-content {
  padding:20px;
}

.comment {
  background:#222;
  padding:8px;
  margin-top:5px;
  border-radius:8px;
}

input {
  width:100%;
  padding:10px;
  margin-top:5px;
}
</style>
</head>

<body>

<h1>RC Spots 🌍</h1>

<div id="map"></div>

<button onclick="toggleForm()">+ Přidat spot</button>

<div id="form" style="display:none;padding:10px;">
<input id="name" placeholder="Název"><br><br>
<input id="type" placeholder="Typ"><br><br>
<input id="difficulty" placeholder="Obtížnost"><br><br>
<input id="length" placeholder="Délka (m)"><br><br>
<input type="file" id="images" multiple><br><br>
<button onclick="saveSpot()">Uložit</button>
</div>

<div id="list"></div>
<div id="modal" class="modal"></div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore, collection, addDoc, getDocs, updateDoc, doc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const app = initializeApp({
  apiKey: "TVŮJ_API_KEY",
  authDomain: "TVŮJ_AUTH_DOMAIN",
  projectId: "rc-spots-ef03d"
});

const db = getFirestore(app);

// MAPA
let map = L.map('map').setView([49.8,15.5],7);
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

let userPos = null;

// 🔥 FUNKCE PRO AKTUALIZACI
function updateUserPosition(pos){

  userPos = {
    lat: pos.coords.latitude,
    lng: pos.coords.longitude
  };

  if(window.userMarker){
    map.removeLayer(window.userMarker);
  }

  window.userMarker = L.circleMarker([userPos.lat, userPos.lng],{
    color:"red",
    radius:8
  }).addTo(map);

  map.setView([userPos.lat, userPos.lng], 13);

  list.innerHTML = "";
  spots = [];
  loadSpots();
}

// 🔥 1. RYCHLÉ NAČTENÍ
navigator.geolocation.getCurrentPosition(updateUserPosition, err=>{
  console.log("GPS chyba:", err);
});

// 🔥 2. PRŮBĚŽNÁ AKTUALIZACE
navigator.geolocation.watchPosition(updateUserPosition, err=>{
  console.log("GPS chyba:", err);
},{
  enableHighAccuracy:true
});

// 📏 vzdálenost
function getDistance(a,b){
  let R=6371;
  let dLat=(b.lat-a.lat)*Math.PI/180;
  let dLng=(b.lng-a.lng)*Math.PI/180;

  let x=Math.sin(dLat/2)**2 +
  Math.cos(a.lat*Math.PI/180) *
  Math.cos(b.lat*Math.PI/180) *
  Math.sin(dLng/2)**2;

  return R*2*Math.atan2(Math.sqrt(x),Math.sqrt(1-x));
}

let newLat,newLng;

map.on("click", e=>{
  newLat=e.latlng.lat;
  newLng=e.latlng.lng;
  alert("Klikni uložit spot");
});

window.toggleForm = function(){
  form.style.display = form.style.display==="none"?"block":"none";
}

// ULOŽENÍ
window.saveSpot = async function(){

  let images=[];

  for(let file of images.files){
    let reader=new FileReader();
    await new Promise(res=>{
      reader.onload=()=>{images.push(reader.result);res();}
      reader.readAsDataURL(file);
    });
  }

  await addDoc(collection(db,"spots"),{
    name:name.value,
    type:type.value,
    difficulty:difficulty.value,
    length:length.value,
    lat:newLat,
    lng:newLng,
    images,
    comments:[],
    ratingDifficulty:[],
    ratingFun:[]
  });

  location.reload();
}

// DATA
let spots=[];

async function loadSpots(){

  let snap = await getDocs(collection(db,"spots"));

  snap.forEach(d=>{
    let s=d.data();
    s.id=d.id;

    if(userPos){
      s.distance = getDistance(userPos,s);
    } else {
      s.distance = 999;
    }

    spots.push(s);
  });

  spots.sort((a,b)=>a.distance-b.distance);

  spots.forEach(s=>{

    let div=document.createElement("div");
    div.className="card";

    let thumbs="";
    (s.images||[]).slice(0,3).forEach(i=>{
      thumbs+=`<img class="thumb" src="${i}">`;
    });

    div.innerHTML=`
      <b>${s.name}</b><br>
      📏 ${s.distance.toFixed(1)} km<br>
      ${thumbs}
      <button onclick="openDetail('${s.id}')">Detail</button>
    `;

    list.appendChild(div);

    L.marker([s.lat,s.lng]).addTo(map);
  });
}

// DETAIL (beze změny)
window.openDetail = function(id){

  document.getElementById("map").classList.add("hidden");

  let s=spots.find(x=>x.id===id);

  let gallery="";
  (s.images||[]).forEach(img=>{
    gallery+=`<img src="${img}" onclick="window.open('${img}')">`;
  });

  let comments="";
  (s.comments||[]).forEach(c=>{
    comments+=`<div class="comment">${c}</div>`;
  });

  let avgDiff = s.ratingDifficulty?.length
    ? (s.ratingDifficulty.reduce((a,b)=>a+b,0)/s.ratingDifficulty.length).toFixed(1)
    : "-";

  let avgFun = s.ratingFun?.length
    ? (s.ratingFun.reduce((a,b)=>a+b,0)/s.ratingFun.length).toFixed(1)
    : "-";

  modal.innerHTML=`
  <div class="modal-content">

  <h2>${s.name}</h2>
  <p>📏 ${s.distance.toFixed(1)} km</p>

  <h3>⭐ Obtížnost: ${avgDiff}</h3>
  <button onclick="rate('${id}','difficulty',5)">5</button>
  <button onclick="rate('${id}','difficulty',3)">3</button>
  <button onclick="rate('${id}','difficulty',1)">1</button>

  <h3>🔥 Zábavnost: ${avgFun}</h3>
  <button onclick="rate('${id}','fun',5)">5</button>
  <button onclick="rate('${id}','fun',3)">3</button>
  <button onclick="rate('${id}','fun',1)">1</button>

  <h3>📸 Fotky</h3>
  <div class="gallery">${gallery}</div>

  <h3>💬 Komentáře</h3>
  ${comments}
  <input id="cinput">
  <button onclick="addComment('${id}')">Přidat</button>

  <button onclick="closeModal()">Zavřít</button>

  </div>
  `;

  modal.style.display="block";
};

window.rate = async function(id,type,val){

  let s=spots.find(x=>x.id===id);

  if(type==="difficulty"){
    s.ratingDifficulty.push(val);
    await updateDoc(doc(db,"spots",id),{
      ratingDifficulty:s.ratingDifficulty
    });
  } else {
    s.ratingFun.push(val);
    await updateDoc(doc(db,"spots",id),{
      ratingFun:s.ratingFun
    });
  }

  openDetail(id);
};

window.closeModal = function(){
  modal.style.display="none";
  document.getElementById("map").classList.remove("hidden");
};

window.addComment = async function(id){

  let s=spots.find(x=>x.id===id);
  let text=document.getElementById("cinput").value;

  if(!text) return;

  s.comments.push(text);

  await updateDoc(doc(db,"spots",id),{
    comments:s.comments
  });

  openDetail(id);
};

loadSpots();

</script>
</body>
</html>
