<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<title>RC Spots 🌍</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #111;
  color: white;
}

header {
  text-align: center;
  padding: 10px;
  font-size: 22px;
}

#map {
  height: 300px;
}

button {
  padding: 10px;
  border: none;
  border-radius: 8px;
  background: #4CAF50;
  color: white;
  width: 100%;
  margin-top: 10px;
}

.card {
  background: #1e1e1e;
  margin: 10px;
  padding: 10px;
  border-radius: 10px;
}

.gallery {
  display: flex;
  gap: 6px;
  flex-wrap: wrap;
  margin-top: 5px;
}

.thumb {
  width: 60px;
  height: 60px;
  object-fit: cover;
  border-radius: 6px;
}

.modal {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.9);
  display: flex;
  justify-content: center;
  align-items: center;
}

.modal-content {
  background: #1e1e1e;
  padding: 15px;
  border-radius: 10px;
  width: 90%;
  max-height: 80%;
  overflow-y: auto;
}

.comment {
  background: #2a2a2a;
  padding: 6px;
  margin-top: 5px;
  border-radius: 6px;
  font-size: 14px;
}

input, select {
  width: 100%;
  padding: 10px;
  border-radius: 8px;
  border: none;
  margin-top: 5px;
}
</style>
</head>

<body>

<header>RC Spots 🌍</header>

<div id="map"></div>

<div style="padding:10px;">
  <button onclick="toggleAdd()">➕ Přidat spot</button>

  <div id="addForm" style="display:none;">
    <input id="name" placeholder="Název spotu">
    <input id="type" placeholder="Typ (crawler/buggy)">
    <input id="length" placeholder="Délka tratě (m)">

    <select id="difficulty">
      <option value="">Obtížnost</option>
      <option value="Lehká">Lehká</option>
      <option value="Střední">Střední</option>
      <option value="Těžká">Těžká</option>
    </select>

    <input type="file" id="photos" multiple>

    <button onclick="saveSpot()">Uložit spot</button>
  </div>
</div>

<h3 style="padding:10px;">🌍 Veřejné spoty</h3>

<div id="list"></div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore, collection, addDoc, onSnapshot, doc, updateDoc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyDMDxeThwcGUICTptG3Cmll31D7h63Sh4U",
  authDomain: "rc-spots-ef03d.firebaseapp.com",
  projectId: "rc-spots-ef03d"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

let map = L.map('map').setView([49.8, 15.5], 7);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png')
.addTo(map);

let selectedLatLng = null;
let spots = [];
let adding = false;

map.on('click', function(e) {
  if (!adding) return;
  selectedLatLng = e.latlng;
  alert("Místo vybráno");
});

window.toggleAdd = function() {
  adding = !adding;
  document.getElementById("addForm").style.display = adding ? "block" : "none";
}

window.saveSpot = async function() {
  if (!selectedLatLng) {
    alert("Klikni na mapu!");
    return;
  }

  const name = nameInput.value;
  const type = typeInput.value;
  const length = lengthInput.value;
  const difficulty = difficulty.value;
  const files = photos.files;

  let images = [];

  for (let file of files) {
    let base64 = await resizeImage(file);
    images.push(base64);
  }

  await addDoc(collection(db, "spots"), {
    name,
    type,
    length,
    difficulty,
    lat: selectedLatLng.lat,
    lng: selectedLatLng.lng,
    images,
    comments: []
  });

  alert("Uloženo!");
}

function resizeImage(file) {
  return new Promise(resolve => {
    const img = new Image();
    const reader = new FileReader();

    reader.onload = e => img.src = e.target.result;

    img.onload = () => {
      const canvas = document.createElement("canvas");
      const max = 800;

      let w = img.width;
      let h = img.height;

      if (w > h && w > max) {
        h *= max / w;
        w = max;
      } else if (h > max) {
        w *= max / h;
        h = max;
      }

      canvas.width = w;
      canvas.height = h;

      const ctx = canvas.getContext("2d");
      ctx.drawImage(img, 0, 0, w, h);

      resolve(canvas.toDataURL("image/jpeg", 0.7));
    };

    reader.readAsDataURL(file);
  });
}

onSnapshot(collection(db, "spots"), snapshot => {

  spots = [];
  list.innerHTML = "";

  snapshot.forEach(docSnap => {
    const s = docSnap.data();
    s.id = docSnap.id;
    spots.push(s);

    L.marker([s.lat, s.lng])
      .addTo(map)
      .bindTooltip(`${s.name} (${s.type})`);

    let thumbs = "";
    (s.images || []).slice(0,3).forEach(img => {
      thumbs += `<img class="thumb" src="${img}">`;
    });

    const div = document.createElement("div");
    div.className = "card";

    div.innerHTML = `
      <b>${s.name}</b><br>
      ${s.type}<br>
      📏 ${s.length || "-"} m<br>
      ⚡ ${s.difficulty || "-"}
      <div class="gallery">${thumbs}</div>
      <button onclick="openDetail('${s.id}')">Detail</button>
    `;

    list.appendChild(div);
  });
});

window.openDetail = function(id) {
  const spot = spots.find(s => s.id === id);

  let imagesHTML = "";
  (spot.images || []).forEach(img => {
    imagesHTML += `<img class="thumb" src="${img}" onclick="window.open('${img}')">`;
  });

  let commentsHTML = "";
  (spot.comments || []).forEach(c => {
    commentsHTML += `<div class="comment">${c.text}</div>`;
  });

  const modal = document.createElement("div");
  modal.className = "modal";

  modal.innerHTML = `
    <div class="modal-content">
      <h2>${spot.name}</h2>
      <p>${spot.type}</p>
      <p>📏 ${spot.length || "-"} m</p>
      <p>⚡ ${spot.difficulty || "-"}</p>

      <h3>📷 Fotky</h3>
      <div class="gallery">${imagesHTML}</div>

      <h3>💬 Komentáře</h3>
      ${commentsHTML}

      <input id="commentInput" placeholder="Napiš komentář">
      <button onclick="addComment('${spot.id}')">Přidat komentář</button>

      <button onclick="this.parentElement.parentElement.remove()">Zavřít</button>
    </div>
  `;

  document.body.appendChild(modal);
}

window.addComment = async function(id) {
  const spot = spots.find(s => s.id === id);
  const text = document.getElementById("commentInput").value;

  if (!text) return;

  const ref = doc(db, "spots", id);

  const newComments = (spot.comments || []).concat({
    text
  });

  await updateDoc(ref, { comments: newComments });

  alert("Komentář přidán");
}

</script>

</body>
</html>
