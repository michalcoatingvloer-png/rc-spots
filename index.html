<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<title>RC Spots</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<style>
body { margin:0; font-family:Arial; background:#111; color:white; }
header { background:#1f1f1f; padding:15px; text-align:center; font-size:20px; }
#map { height:300px; }
main { padding:15px; }

input, button {
    width:100%;
    padding:10px;
    margin-bottom:10px;
    border-radius:8px;
    border:none;
}

button {
    background:#4CAF50;
    color:white;
}

.thumb {
    width:80px;
    height:80px;
    object-fit:cover;
    margin:3px;
    cursor:pointer;
    border-radius:6px;
}

.card {
    background:#1e1e1e;
    padding:10px;
    border-radius:10px;
    margin-bottom:10px;
}
</style>
</head>
<body>

<header>RC Spots 🌍</header>

<div id="map"></div>

<main>

<h3>🌍 Veřejné spoty</h3>

<input id="name" placeholder="Název spotu">
<input id="type" placeholder="Typ (crawler / buggy)">
<input type="file" id="photos" multiple>

<button onclick="savePoint()">Uložit spot</button>

<div id="list"></div>

</main>

<input type="file" id="hiddenFileInput" multiple style="display:none">

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, collection, addDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyDMDxeThwcGUICTptG3Cmll31D7h63Sh4U",
  authDomain: "rc-spots-ef03d.firebaseapp.com",
  projectId: "rc-spots-ef03d",
  storageBucket: "rc-spots-ef03d.firebasestorage.app",
  messagingSenderId: "926140978370",
  appId: "1:926140978370:web:20b43a7e44646f2b5b575b"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

// MAPA
let map = L.map('map').setView([49.8, 15.5], 7);
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

let lastClick = null;
let tempMarker;
let markers = [];

map.on('click', e => {
    lastClick = e.latlng;

    if (tempMarker) map.removeLayer(tempMarker);

    tempMarker = L.marker(e.latlng).addTo(map);
});

// RESIZE FOTO
function resizeImage(file, callback) {
    let img = new Image();
    let reader = new FileReader();

    reader.onload = e => img.src = e.target.result;

    img.onload = () => {
        let canvas = document.createElement("canvas");
        let ctx = canvas.getContext("2d");

        let max = 800;
        let w = img.width, h = img.height;

        if (w > h && w > max) { h *= max/w; w = max; }
        else if (h > max) { w *= max/h; h = max; }

        canvas.width = w;
        canvas.height = h;

        ctx.drawImage(img,0,0,w,h);

        callback(canvas.toDataURL("image/jpeg",0.7));
    };

    reader.readAsDataURL(file);
}

// ULOŽENÍ SPOTU
window.savePoint = function() {

    if (!lastClick) {
        alert("Klikni do mapy");
        return;
    }

    let name = document.getElementById("name").value;
    let type = document.getElementById("type").value;
    let files = document.getElementById("photos").files;

    if (!name) {
        alert("Zadej název");
        return;
    }

    let images = [];
    let loaded = 0;

    if (!files.length) {
        createSpot(images);
        return;
    }

    for (let f of files) {
        resizeImage(f, img => {
            images.push(img);
            loaded++;

            if (loaded === files.length) {
                createSpot(images);
            }
        });
    }

    async function createSpot(images) {
        await addDoc(collection(db, "spots"), {
            name,
            type,
            lat: lastClick.lat,
            lng: lastClick.lng,
            images
        });

        document.getElementById("name").value="";
        document.getElementById("type").value="";
        document.getElementById("photos").value="";
    }
};

// NAČÍTÁNÍ (REALTIME)
onSnapshot(collection(db, "spots"), snapshot => {

    // smaž staré markery
    markers.forEach(m => map.removeLayer(m));
    markers = [];

    let list = document.getElementById("list");
    list.innerHTML = "";

    snapshot.forEach(doc => {
        let s = doc.data();

        // marker
        let marker = L.marker([s.lat, s.lng]).addTo(map);
        marker.bindTooltip(s.name + " (" + s.type + ")");
        markers.push(marker);

        // seznam
        let div = document.createElement("div");
        div.className = "card";

        let imagesHTML = "";
        (s.images || []).forEach(img => {
            imagesHTML += `<img class="thumb" src="${img}" onclick="window.open('${img}')">`;
        });

        div.innerHTML = `
            <b>${s.name}</b><br>
            ${s.type}<br>
            ${imagesHTML}
        `;

        list.appendChild(div);
    });

});

</script>

</body>
</html>
