<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<title>RC Spots</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<style>
body { margin:0; font-family:Arial; background:#111; color:white; }

#map { height:50vh; }

.card {
    background:#1e1e1e;
    padding:10px;
    margin:10px;
    border-radius:10px;
    cursor:pointer;
}

/* 🔥 GRID MINIATUR */
.thumb-grid {
    display:flex;
    gap:5px;
    margin-top:5px;
}

.thumb {
    width:60px;
    height:60px;
    object-fit:cover;
    border-radius:6px;
}

/* DETAIL */
#detailPanel {
    position:fixed;
    bottom:-100%;
    width:100%;
    height:65%;
    background:#1a1a1a;
    padding:15px;
    overflow:auto;
    transition:0.3s;
}

#detailPanel.active { bottom:0; }

.detail-img {
    width:100%;
    margin-top:5px;
    border-radius:8px;
    cursor:pointer;
}

.comment {
    background:#2a2a2a;
    padding:5px;
    margin-top:5px;
    border-radius:5px;
}

input, button {
    width:100%;
    padding:10px;
    margin-top:5px;
    border:none;
    border-radius:6px;
}
</style>
</head>
<body>

<div id="map"></div>
<div id="list"></div>

<!-- DETAIL -->
<div id="detailPanel">
<h3 id="d_name"></h3>
<div id="d_type"></div>

<div id="gallery"></div>

<div id="comments"></div>

<input id="commentInput" placeholder="Komentář">
<button onclick="addComment()">Přidat komentář</button>

<button onclick="navigate()">Navigovat</button>
<button onclick="closeDetail()">Zavřít</button>
</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, collection, onSnapshot, doc, updateDoc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyDMDxeThwcGUICTptG3Cmll31D7h63Sh4U",
  authDomain: "rc-spots-ef03d.firebaseapp.com",
  projectId: "rc-spots-ef03d"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

let map = L.map('map').setView([49.8,15.5],7);
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

let userPos = null;
let selectedSpot = null;

// GPS
navigator.geolocation.getCurrentPosition(pos=>{
    userPos = {
        lat: pos.coords.latitude,
        lng: pos.coords.longitude
    };

    map.setView([userPos.lat,userPos.lng],13);

    L.circleMarker([userPos.lat,userPos.lng],{
        radius:8,
        color:"red"
    }).addTo(map);
});

// vzdálenost
function getDistance(a,b){
    let R = 6371;
    let dLat = (b.lat-a.lat)*Math.PI/180;
    let dLng = (b.lng-a.lng)*Math.PI/180;

    let x = Math.sin(dLat/2)**2 +
        Math.cos(a.lat*Math.PI/180)*
        Math.cos(b.lat*Math.PI/180)*
        Math.sin(dLng/2)**2;

    return R * 2 * Math.atan2(Math.sqrt(x),Math.sqrt(1-x));
}

// DETAIL
window.openDetail = function(spot,id){

    selectedSpot = { ...spot, id };

    d_name.innerText = spot.name;
    d_type.innerText = spot.type;

    gallery.innerHTML="";
    (spot.images||[]).forEach(img=>{
        gallery.innerHTML += `<img class="detail-img" src="${img}" onclick="openImage('${img}')">`;
    });

    comments.innerHTML="";
    (spot.comments||[]).forEach(c=>{
        comments.innerHTML += `<div class="comment">${c.text}</div>`;
    });

    detailPanel.classList.add("active");
};

window.closeDetail = function(){
    detailPanel.classList.remove("active");
};

// otevřít fotku
window.openImage = function(src){
    let w = window.open("");
    w.document.write(`<img src="${src}" style="width:100%">`);
};

// komentář
window.addComment = async function(){

    let text = commentInput.value;
    if (!text) return;

    let ref = doc(db,"spots",selectedSpot.id);

    let newComments = (selectedSpot.comments||[]).concat({
        text:text
    });

    await updateDoc(ref,{ comments:newComments });

    commentInput.value="";
};

// navigace
window.navigate = function(){
    window.open(`https://www.google.com/maps/dir/?api=1&destination=${selectedSpot.lat},${selectedSpot.lng}`);
};

// realtime
onSnapshot(collection(db,"spots"), snapshot=>{

    list.innerHTML="";
    map.eachLayer(l=>{
        if (l instanceof L.Marker) map.removeLayer(l);
    });

    let spots=[];

    snapshot.forEach(doc=>{
        let s = doc.data();
        s.id = doc.id;

        if (userPos){
            s.distance = getDistance(userPos,s);
        } else {
            s.distance = 999;
        }

        spots.push(s);
    });

    spots.sort((a,b)=>a.distance-b.distance);

    spots.forEach(s=>{

        // marker
        L.marker([s.lat,s.lng])
            .addTo(map)
            .on("click",()=>openDetail(s,s.id));

        // 🔥 miniatury (max 3)
        let thumbs = "";
        if (s.images) {
            thumbs = `<div class="thumb-grid">` +
                s.images.slice(0,3).map(img =>
                    `<img class="thumb" src="${img}">`
                ).join("") +
                `</div>`;
        }

        let div=document.createElement("div");
        div.className="card";

        div.innerHTML=`
            <b>${s.name}</b><br>
            ${s.type}<br>
            📏 ${s.distance.toFixed(1)} km
            ${thumbs}
        `;

        div.onclick=()=>openDetail(s,s.id);

        list.appendChild(div);

    });

});

</script>

</body>
</html>
