<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<title>RC Spots 🌍</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>

<style>
body { margin:0; font-family:Arial; background:#111; color:white; }

#map { height:300px; }

.card {
  background:#1e1e1e;
  margin:10px;
  padding:10px;
  border-radius:10px;
}

button {
  padding:10px;
  border:none;
  border-radius:8px;
  background:#4CAF50;
  color:white;
  width:100%;
  margin-top:10px;
}

.thumb {
  width:60px;
  height:60px;
  object-fit:cover;
  border-radius:6px;
}

.gallery {
  display:flex;
  gap:6px;
  flex-wrap:wrap;
}

.gallery img {
  width:90px;
  height:90px;
  object-fit:cover;
  border-radius:8px;
}

/* DETAIL */
.modal {
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.95);
  display:flex;
  justify-content:center;
  align-items:center;
  z-index:1000;
}

.modal-content {
  background:#1e1e1e;
  padding:15px;
  border-radius:12px;
  width:90%;
  max-height:85%;
  overflow:auto;
}

/* FULLSCREEN FOTO */
#viewer {
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:black;
  display:none;
  justify-content:center;
  align-items:center;
  z-index:9999;
}

#viewer img {
  max-width:100%;
  max-height:100%;
}

.comment {
  background:#2a2a2a;
  padding:6px;
  margin-top:5px;
  border-radius:6px;
}

input { width:100%; padding:10px; margin-top:5px; }
</style>
</head>

<body>

<div id="map"></div>

<div style="padding:10px;">
<button onclick="toggleAdd()">➕ Přidat spot</button>

<div id="addForm" style="display:none;">
<input id="name" placeholder="Název">
<input id="type" placeholder="Typ">
<input type="file" id="photos" multiple>
<button onclick="saveSpot()">Uložit</button>
</div>
</div>

<div id="list"></div>

<div id="viewer" onclick="this.style.display='none'">
  <img id="viewerImg">
</div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore, collection, addDoc, onSnapshot, doc, updateDoc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const app = initializeApp({
  apiKey: "AIzaSy...",
  authDomain: "rc-spots-ef03d.firebaseapp.com",
  projectId: "rc-spots-ef03d"
});

const db = getFirestore(app);

// MAPA
let map = L.map('map').setView([49.8,15.5],7);
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

let userPos=null;

// 📍 GPS
navigator.geolocation.getCurrentPosition(pos=>{
  userPos={
    lat:pos.coords.latitude,
    lng:pos.coords.longitude
  };

  L.circleMarker([userPos.lat,userPos.lng],{
    color:"red",
    radius:8
  }).addTo(map);

  map.setView([userPos.lat,userPos.lng],13);
});

// 📏 vzdálenost
function dist(a,b){
  let R=6371;
  let dLat=(b.lat-a.lat)*Math.PI/180;
  let dLng=(b.lng-a.lng)*Math.PI/180;

  let x=Math.sin(dLat/2)**2+
  Math.cos(a.lat*Math.PI/180)*
  Math.cos(b.lat*Math.PI/180)*
  Math.sin(dLng/2)**2;

  return R*2*Math.atan2(Math.sqrt(x),Math.sqrt(1-x));
}

let spots=[];

onSnapshot(collection(db,"spots"), snap=>{
  list.innerHTML="";
  spots=[];

  snap.forEach(d=>{
    let s=d.data();
    s.id=d.id;

    if(userPos){
      s.distance=dist(userPos,s);
    } else s.distance=999;

    spots.push(s);
  });

  // 🔥 SEŘAZENÍ
  spots.sort((a,b)=>a.distance-b.distance);

  spots.forEach(s=>{

    L.marker([s.lat,s.lng]).addTo(map);

    let thumbs="";
    (s.images||[]).slice(0,3).forEach(i=>{
      thumbs+=`<img class="thumb" src="${i}">`;
    });

    let div=document.createElement("div");
    div.className="card";

    div.innerHTML=`
      <b>${s.name}</b><br>
      📏 ${s.distance.toFixed(1)} km<br>
      ${thumbs}
      <button onclick="openDetail('${s.id}')">Detail</button>
    `;

    list.appendChild(div);
  });
});

// DETAIL
window.openDetail=id=>{
  let s=spots.find(x=>x.id===id);

  let imgs="";
  (s.images||[]).forEach(i=>{
    imgs+=`<img src="${i}" onclick="showImg('${i}')">`;
  });

  let modal=document.createElement("div");
  modal.className="modal";

  modal.innerHTML=`
  <div class="modal-content">
    <h2>${s.name}</h2>

    <div class="gallery">${imgs}</div>

    <button onclick="this.parentElement.parentElement.remove()">Zavřít</button>
  </div>
  `;

  document.body.appendChild(modal);
};

// 🔥 FOTO FUNKCE (funguje na mobilu)
window.showImg=src=>{
  viewer.style.display="flex";
  viewerImg.src=src;
};

</script>
</body>
</html>
